name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ruff check
        uses: astral-sh/ruff-action@v3
        with:
          args: "check --output-format=github"

  test:
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install system libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libegl1 libgl1 libxkbcommon0 xvfb

      - name: Install deps
        run: uv sync --no-default-groups --group ci --group dev

      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: uv run xvfb-run pytest tests/ -v --tb=short

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: uv run pytest tests/ -v --tb=short
